<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="../img/ABP.ico?v=2">
    <link rel="shortcut icon" href="../img/ABP.ico?v=2" type="image/x-icon">
    <link rel="apple-touch-icon" href="../img/ABPEREIRA%20L.png?v=2">
    <link rel="manifest" href="../manifest.json?v=2">
    <meta name="theme-color" content="#0c3363">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | A⁺Pereira Company</title>
    <link rel="stylesheet" href="../styles/style.css">
    <style>
        :root {
            --primary: #0c3363;
            --accent: #be945d;
            --bg: #0c1d34;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background: radial-gradient(circle at top right, #17365f, #0c1d34);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            padding: 2rem 2rem 8rem; /* Aumentado significativamente el padding inferior */
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
            margin-top: -2rem; /* Sube toda la tarjeta un poco */
        }

        .login-card img {
            width: 110px; /* Un poco más pequeño para ganar espacio vertical */
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 10px rgba(190, 148, 93, 0.3));
            background: transparent;
            border-radius: 0;
            padding: 0;
        }

        .btn-cancel {
            display: block;
            width: 100%;
            padding: 1rem;
            background: transparent;
            color: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 1rem;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border-color: rgba(255, 255, 255, 0.2);
        }

        .login-card h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            color: white;
            margin-bottom: 0.3rem;
        }

        .login-card p {
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.2rem; /* Reducido ligeramente */
        }

        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
            color: var(--accent);
        }

        .form-group input {
            width: 100%;
            padding: 1.1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .remember-wrap {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: -0.5rem;
            margin-bottom: 1rem;
            justify-content: flex-start;
        }

        .remember-wrap label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            text-transform: none;
            letter-spacing: normal;
            font-weight: 400;
            margin-bottom: 0;
        }

        .remember-wrap input[type="checkbox"] {
            width: 14px;
            height: 14px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        .form-group input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(190, 148, 93, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 1.1rem;
            background: linear-gradient(135deg, var(--accent) 0%, #d5b082 100%);
            color: #0c1d34;
            border: none;
            border-radius: 15px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(190, 148, 93, 0.2);
        }

        .btn-cancel {
            display: none; /* Oculto por defecto */
            margin-top: 1.5rem;
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .btn-cancel:hover {
            color: var(--accent);
        }
        .btn-faceid {
            width: 100%;
            padding: 1.1rem;
            background: transparent;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 999px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .btn-faceid:hover {
            border-color: var(--accent);
            background: rgba(190, 148, 93, 0.05);
        }

        .faceid-icon-wrap {
            background: rgba(255, 255, 255, 0.1);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            right: 10px;
        }

        .faceid-icon-wrap svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        #error-msg {
            background: rgba(211, 47, 47, 0.1);
            color: #ff8a80;
            padding: 0.8rem;
            border-radius: 10px;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            display: none;
            border: 1px solid rgba(211, 47, 47, 0.2);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="../img/ABPEREIRA L.png" alt="A⁺Pereira">
        <h1>Bienvenido</h1>
        <p>Gestión de A⁺Pereira Company</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Usuario Administrador</label>
                <input type="text" id="username" placeholder="Usuario" autocomplete="username" required>
            </div>
            <div class="remember-wrap">
                <input type="checkbox" id="rememberUser">
                <label for="rememberUser">Recordar usuario</label>
            </div>
            <div class="form-group">
                <label>Contraseña Segura</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login">Acceder</button>
            <button type="button" class="btn-faceid" id="faceIdBtn">
                Ingresar con Face ID
                <div class="faceid-icon-wrap">
                    <svg viewBox="0 0 24 24"><path d="M12,2C6.48,2,2,6.48,2,12s4.48,10,10,10,10-4.48,10-10S17.52,2,12,2z M12,20c-4.41,0-8-3.59-8-8s3.59-8,8-8,8,3.59,8,8 S16.41,20,12,20z M12,6c-3.31,0-6,2.69-6,6s2.69,6,6,6s6-2.69,6-6S15.31,6,12,6z M12,16c-2.21,0-4-1.79-4-4s1.79-4,4-4s4,1.79,4,4 S14.21,16,12,16z"/></svg>
                </div>
            </button>
            <a href="index.html" class="btn-cancel" id="btnCancel">Cancelar y Volver</a>
        </form>
        <div id="error-msg">Credenciales de administrador inválidas</div>
    </div>

    <script>
        // --- DETECTAR MODO (WEB VS APP/HOME SCREEN) ---
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        const btnCancel = document.getElementById('btnCancel');
        
        if (!isStandalone) {
             btnCancel.style.display = 'inline-block';
         }

         const loginForm = document.getElementById('loginForm');
         const usernameInput = document.getElementById('username');
         const passwordInput = document.getElementById('password');
         const rememberCheckbox = document.getElementById('rememberUser');
  
         // Cargar usuario guardado
        if (localStorage.getItem('savedAdminUser')) {
            usernameInput.value = localStorage.getItem('savedAdminUser');
            rememberCheckbox.checked = true;
        }

        // Función para validar credenciales y entrar
        function attemptLogin(user, pass) {
            if ((user === 'admin' || user === 'admin2') && pass === 'abp2026') {
                if (rememberCheckbox.checked) {
                    localStorage.setItem('savedAdminUser', user);
                } else {
                    localStorage.removeItem('savedAdminUser');
                }
                sessionStorage.setItem('isAdmin', 'true');
                window.location.href = 'admin-dashboard.html';
                return true;
            }
            return false;
        }

        // --- 1. Autocompletado Automático ---
        // Detectamos cuando el navegador llena los campos (como con Face ID autofill)
        let autoLoginTriggered = false;
        
        function checkAutoFill() {
            if (autoLoginTriggered) return;
            
            // Si ambos campos tienen valor y el usuario no está escribiendo activamente
            if (usernameInput.value && passwordInput.value) {
                autoLoginTriggered = true;
                // Pequeño retraso para asegurar que el DOM terminó de procesar el autofill
                setTimeout(() => {
                    if (attemptLogin(usernameInput.value, passwordInput.value)) {
                        console.log("Autologin exitoso via Autofill");
                    } else {
                        autoLoginTriggered = false; // Reset si falló (por si el usuario quiere corregir)
                    }
                }, 500);
            }
        }

        // Monitorear cambios (autofill dispara 'input' o 'change')
        usernameInput.addEventListener('input', checkAutoFill);
        passwordInput.addEventListener('input', checkAutoFill);
        
        // --- 2. Botón Face ID (Activa el sistema nativo) ---
        document.getElementById('faceIdBtn').addEventListener('click', async function() {
            try {
                // Verificar si hay algún admin con biometría activa en este dispositivo
                const isAdmin1Bio = localStorage.getItem('bio_active_admin') === 'true';
                const isAdmin2Bio = localStorage.getItem('bio_active_admin2') === 'true';

                if (!isAdmin1Bio && !isAdmin2Bio) {
                    alert("No has configurado Face ID todavía. Por favor, ingresa con tu contraseña una vez y configúralo en el panel.");
                    passwordInput.focus();
                    return;
                }

                // Intentar autenticación biométrica real
                const challenge = new Uint8Array(32);
                window.crypto.getRandomValues(challenge);

                const options = {
                    publicKey: {
                        challenge: challenge,
                        timeout: 60000,
                        userVerification: "required"
                    }
                };

                const assertion = await navigator.credentials.get(options);
                
                if (assertion) {
                    // Si el dispositivo autoriza, buscamos qué usuario está activo en este equipo
                    const userToLogin = isAdmin1Bio ? 'admin' : 'admin2';
                    sessionStorage.setItem('isAdmin', 'true');
                    window.location.href = 'admin-dashboard.html';
                }
            } catch (err) {
                console.log("Face ID cancelado o no disponible:", err);
                // Fallback a autocompletado normal si la API real falla
                if (usernameInput.value && passwordInput.value) {
                    attemptLogin(usernameInput.value, passwordInput.value);
                } else {
                    passwordInput.focus();
                }
            }
        });

        // --- 3. Login Manual ---
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const user = usernameInput.value;
            const pass = passwordInput.value;

            if (!attemptLogin(user, pass)) {
                const error = document.getElementById('error-msg');
                error.style.display = 'block';
                setTimeout(() => error.style.display = 'none', 3000);
            }
        });
    </script>
</body>
</html>
