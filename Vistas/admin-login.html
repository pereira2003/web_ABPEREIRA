<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="../img/ABP.ico">
    <link rel="shortcut icon" href="../img/ABP.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="../img/ABPEREIRA%20L.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | A⁺Pereira Company</title>
    <link rel="stylesheet" href="../styles/style.css">
    <style>
        :root {
            --primary: #0c3363;
            --accent: #be945d;
            --bg: #0c1d34;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background: radial-gradient(circle at top right, #17365f, #0c1d34);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            padding: 3.5rem 2.5rem;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
        }

        .login-card img {
            width: 130px;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 10px rgba(190, 148, 93, 0.3));
            background: transparent; /* Remove white background */
            border-radius: 0;
            padding: 0;
        }

        .btn-cancel {
            display: block;
            width: 100%;
            padding: 1rem;
            background: transparent;
            color: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 1rem;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border-color: rgba(255, 255, 255, 0.2);
        }

        .login-card h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .login-card p {
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 2.5rem;
            font-size: 0.9rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
            color: var(--accent);
        }

        .form-group input {
            width: 100%;
            padding: 1.1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(190, 148, 93, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 1.1rem;
            background: linear-gradient(135deg, var(--accent) 0%, #d5b082 100%);
            color: #0c1d34;
            border: none;
            border-radius: 15px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(190, 148, 93, 0.2);
        }

        #error-msg {
            background: rgba(211, 47, 47, 0.1);
            color: #ff8a80;
            padding: 0.8rem;
            border-radius: 10px;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            display: none;
            border: 1px solid rgba(211, 47, 47, 0.2);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="../img/ABPEREIRA L.png" alt="A⁺Pereira">
        <h1>Bienvenido</h1>
        <p>Gestión de A⁺Pereira Company</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Usuario Administrador</label>
                <input type="text" id="username" placeholder="Usuario" required>
            </div>
            <div class="form-group">
                <label>Contraseña Segura</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Desbloquear Panel</button>
            <a href="index.html" class="btn-cancel">Cancelar y Volver</a>
        </form>
        <div id="error-msg">Credenciales de administrador inválidas</div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if ((user === 'admin' || user === 'admin2') && pass === 'abp2026') {
                sessionStorage.setItem('isAdmin', 'true');
                window.location.href = 'admin-dashboard.html';
            } else {
                const error = document.getElementById('error-msg');
                error.style.display = 'block';
                setTimeout(() => error.style.display = 'none', 3000);
            }
        });
    </script>
</body>
</html>
