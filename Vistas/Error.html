<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error | A⁺Pereira Company</title>
    <link rel="icon" type="image/x-icon" href="../img/ABP.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0c3363;
            --accent: #be945d;
            --text: #1a1a1a;
            --bg: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            text-align: center;
            color: var(--text);
        }

        .container {
            padding: 2rem;
            max-width: 800px;
            width: 90%;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            color: var(--primary);
            margin: 0;
            letter-spacing: -1px;
        }

        p {
            font-size: 1.2rem;
            color: #555;
            margin: 1rem 0 4rem;
            font-weight: 300;
        }

        .scene {
            position: relative;
            height: 300px;
            width: 100%;
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .maintenance-illustration {
            width: 320px;
            height: 260px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow: hidden;
        }

        .tech-img {
            width: 300px;
            height: auto;
            z-index: 2;
            mix-blend-mode: darken;
            filter: contrast(1.2) brightness(1.1);
            margin-top: -10px; 
        }

        .glow-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 260px;
            height: 260px;
            background: radial-gradient(circle, rgba(190, 148, 93, 0.15) 0%, rgba(255,255,255,0) 70%);
            z-index: 1;
        }

        .status-loader {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 2rem;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 50%;
            animation: dotWave 1.2s infinite ease-in-out;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotWave {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
            40% { transform: translateY(-15px); opacity: 1; }
        }

        .btn-retry {
            margin-top: 2rem;
            padding: 1rem 2.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-retry:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(12, 51, 99, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="scene">
            <div class="glow-circle"></div>
            <div class="maintenance-illustration">
                <img src="../img/icono de mantenimiento.jpg" alt="Technician" class="tech-img">
            </div>
        </div>
        
        <h1 id="errorTitle">Connection Lost</h1>
        <p id="errorMsg">Please check your internet connection and try again. We'll be here waiting for you.</p>
        
        <div class="status-loader">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <button onclick="window.location.reload()" class="btn-retry">Retry Connection</button>
    </div>

    <script>
        // Personalizar mensaje según el tipo de error (url params)
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');

        if (type === 'load') {
            document.title = "Loading Error | A⁺Pereira";
            document.getElementById('errorTitle').textContent = "Loading Error";
            document.getElementById('errorMsg').textContent = "We encountered a problem while loading the page. Let's try refreshing.";
        }

        // Si el internet vuelve, regresar automáticamente
        window.addEventListener('online', () => {
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
