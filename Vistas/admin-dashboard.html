<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="shortcut icon" href="../img/ABP.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | A+Pereira Company</title>
    <link rel="stylesheet" href="../styles/style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        /* --- ESTILO DEL MODAL (IGUAL A LA IMAGEN) --- */
        .custom-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(16, 35, 63, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.3s ease-out;
            display: none; /* Oculto por defecto */
        }

        .modal-content {
            background: #ffffff;
            padding: 2.5rem 2rem;
            border-radius: 32px;
            width: 95%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.35);
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal-header h3 {
            margin: 0 0 1.5rem 0;
            color: #0c3363;
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            font-weight: 700;
        }

        #choiceMessage {
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            color: #1a1a1a;
        }

        .calendar-options {
            background: #f8fafd;
            padding: 1.8rem 1.5rem;
            border-radius: 20px;
            border: 1px solid #e1e8f0;
            margin-top: 1rem;
        }

        .calendar-options p {
            font-weight: 600;
            margin-bottom: 1.2rem;
            font-size: 0.95rem;
            color: #5c6d84;
        }

        .calendar-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .btn-cal {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 0.9rem;
            border: 1.5px solid #d0dbe8;
            border-radius: 14px;
            background: #ffffff;
            color: #2c3e50;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-cal img {
            width: 22px;
            height: 22px;
            object-fit: contain;
        }

        .btn-cal:hover {
            border-color: #0c3363;
            background: #f0f7ff;
            transform: translateY(-2px);
        }

        .btn-close-modal {
            width: 100%;
            padding: 1.1rem;
            background: #0c3363;
            color: #ffffff;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1.5rem;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- RESTO DEL ESTILO DASHBOARD --- */

        :root {
            --primary: #0c3363;
            --accent: #be945d;
            --bg: #f4f7fa;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #667;
            --danger: #d32f2f;
            --success: #2e7d32;
            --warning: #ed6c02;
            --wa-color: #25D366;
            --im-color: #1976D2;
        }

        body {
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            margin: 0;
            color: var(--text-main);
        }

        .dashboard-container {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: var(--primary);
            padding: 1.5rem;
            border-radius: 20px;
            color: white;
            box-shadow: 0 10px 30px rgba(12, 51, 99, 0.2);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header h1 {
            margin: 0;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
        }

        .stats-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1.2rem;
            border-radius: 15px;
            flex: 1;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .stat-card.active {
            border-color: var(--accent);
            background: #fffdfa;
        }

        .stat-card strong {
            font-size: 1.5rem;
            color: var(--primary);
        }

        .stat-card.active strong {
            color: var(--accent);
        }

        .appointments-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        @media (max-width: 768px) {
            .dashboard-container { padding: 1rem; }
            .header { 
                flex-direction: column; 
                text-align: center; 
                padding: 1.5rem 1rem;
                gap: 1.5rem;
            }
            .header div { 
                flex-direction: column;
                gap: 0.8rem !important;
            }
            .header img {
                width: 80px !important;
            }
            .stats-bar { 
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 0.8rem;
            }
            .stat-card {
                padding: 1rem;
            }
            .stat-card span {
                font-size: 0.8rem;
            }
            .stat-card strong {
                font-size: 1.2rem;
            }
            .appointments-grid { 
                grid-template-columns: 1fr; 
                gap: 1rem;
            }
            .appointment-card { 
                padding: 1.2rem; 
                border-radius: 20px;
            }
            .card-header h3 {
                font-size: 1.2rem;
            }
            .actions-grid { 
                grid-template-columns: 1fr; 
                gap: 0.6rem;
            }
            .btn-dash {
                padding: 1rem;
                font-size: 0.9rem;
            }
            .btn-calendar { 
                grid-column: span 1; 
            }
        }

        .appointment-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .appointment-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }

        .status-strip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: #ddd;
        }

        .status-pending .status-strip { background: var(--warning); }
        .status-accepted .status-strip { background: var(--success); }
        .status-rejected .status-strip { background: var(--danger); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }

        .card-header h3 {
            margin: 0;
            font-size: 1.4rem;
            color: var(--primary);
            font-family: 'Cormorant Garamond', serif;
        }

        .status-tag {
            padding: 0.3rem 0.7rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .tag-pending { background: #fff4e5; color: var(--warning); }
        .tag-accepted { background: #edf7ed; color: var(--success); }
        .tag-rejected { background: #fdeded; color: var(--danger); }

        .date-badge {
            background: #e8f0fe;
            color: var(--primary);
            padding: 0.4rem 0.8rem;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-top: 0.5rem;
            display: inline-block;
        }

        .info-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.95rem;
        }

        .info-item svg {
            width: 18px;
            height: 18px;
            color: var(--accent);
            flex-shrink: 0;
        }

        .description-box {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #444;
            margin-top: 1rem;
            border-left: 3px solid #ddd;
        }

        .actions-grid {
            margin-top: 1.5rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
        }

        .btn-dash {
            padding: 0.7rem;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .btn-dash img {
            width: 16px;
            height: 16px;
        }

        .btn-accept-wa { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        .btn-accept-im { background: #e3f2fd; color: #1976d2; border: 1px solid #90caf9; }
        .btn-reject-wa { background: #ed6c02; color: white; border: none; }
        .btn-reject-im { background: #ffffff; color: #1976d2; border: 1px solid #ddd; }

        .btn-accept-wa:hover { background: #c8e6c9; }
        .btn-accept-im:hover { background: #bbdefb; }
        .btn-reject-wa:hover { background: #e65100; }
        .btn-reject-im:hover { background: #f5f5f5; }

        .btn-calendar {
            grid-column: span 2;
            background: #fff8e1;
            color: #b58105;
            border: 1px solid #ffeeba;
        }
        .btn-calendar:hover { background: #ffecb3; }

        .btn-logout {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            grid-column: 1 / -1;
            padding: 5rem;
            color: var(--text-muted);
        }

        /* FormSubmit hidden helper */
        #emailTrigger { display: none; }
    </style>
</head>
<body>
    <!-- Modal de Selección de App (IGUAL A LA IMAGEN) -->
    <div id="choiceModal" class="custom-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Select Messaging App</h3>
            </div>
            <div class="modal-body">
                <div id="choiceMessage">
                    <!-- Dinámico -->
                </div>
                <div class="calendar-options">
                    <p>Choose how to notify the client:</p>
                    <div class="calendar-buttons">
                        <button id="whatsappBtn" class="btn-cal" style="border-color: #25D366;">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA"> WhatsApp
                        </button>
                        <button id="imessageBtn" class="btn-cal" style="border-color: #1976D2;">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/5/56/IMessage_logo_%28Apple_Inc.%29.png" alt="iM"> iMessage / SMS
                        </button>
                    </div>
                </div>
            </div>
            <button onclick="closeChoiceModal()" class="btn-close-modal">CANCEL</button>
        </div>
    </div>

    <div class="dashboard-container">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <img src="../img/ABPEREIRA L.png" alt="A+Pereira Logo" style="width: 60px; height: auto; object-fit: contain;">
                <h1>A+Pereira Management</h1>
            </div>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>

        <div class="stats-bar">
            <div class="stat-card active" id="filterAll" onclick="setFilter('all')">
                <span>Total Solicitudes</span>
                <strong id="totalCount">0</strong>
            </div>
            <div class="stat-card" id="filterPending" onclick="setFilter('pending')">
                <span>Pendientes</span>
                <strong id="pendingCount">0</strong>
            </div>
            <div class="stat-card" id="filterAccepted" onclick="setFilter('accepted')">
                <span>Completadas/Aceptadas</span>
                <strong id="acceptedCount">0</strong>
            </div>
            <div class="stat-card" id="filterRejected" onclick="setFilter('rejected')">
                <span>Rechazadas/Archivadas</span>
                <strong id="rejectedCount">0</strong>
            </div>
        </div>

        <div id="appointmentsList" class="appointments-grid">
            <!-- Appointments loaded via JS -->
        </div>
    </div>

    <!-- Hidden form for Email Notifications -->
    <form id="emailTrigger" action="https://formsubmit.co/ajax/a90011410@gmail.com" method="POST">
        <input type="hidden" name="to_client" id="emailTo">
        <input type="hidden" name="status_update" id="emailStatus">
        <input type="hidden" name="date_info" id="emailDate">
        <input type="hidden" name="_subject" id="emailSubject">
    </form>

    <script>
        if (sessionStorage.getItem('isAdmin') !== 'true') {
            window.location.href = 'admin-login.html';
        }

        // --- Firebase Configuration ---
        const _0x4a2e = ["AIzaSy", "D6h6fErJd", "-nVhvxsTy", "BdJmkqLMzzR4rOk"];
        const firebaseConfig = {
            apiKey: _0x4a2e.join(""),
            authDomain: "abpereira-web.firebaseapp.com",
            databaseURL: "https://abpereira-web-default-rtdb.firebaseio.com",
            projectId: "abpereira-web",
            storageBucket: "abpereira-web.firebasestorage.app",
            messagingSenderId: "270636168434",
            appId: "1:270636168434:web:046c7d9bc4d55aaececc6b",
            measurementId: "G-267XCN719L"
        };

        // Initialize Firebase
        let db = null;
        if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
        }

        const DETAILS_KEY = 'abp_booked_details';
        const DATES_KEY = 'abp_booked_dates';
        let currentAppointments = []; // Global store for loaded appointments
        let currentFilter = 'all'; // Global filter state

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.stat-card').forEach(card => card.classList.remove('active'));
            if (filter === 'all') document.getElementById('filterAll').classList.add('active');
            if (filter === 'pending') document.getElementById('filterPending').classList.add('active');
            if (filter === 'accepted') document.getElementById('filterAccepted').classList.add('active');
            if (filter === 'rejected') document.getElementById('filterRejected').classList.add('active');
            renderAppointments();
        }

        async function loadAppointments() {
            let appointments = [];
            if (db) {
                try {
                    const snapshot = await db.ref('appointments').once('value');
                    const data = snapshot.val();
                    if (data) {
                        appointments = Object.keys(data).map(key => ({ ...data[key], fbKey: key }));
                    }
                } catch (error) {
                    console.error("Firebase load error:", error);
                    appointments = JSON.parse(localStorage.getItem(DETAILS_KEY) || '[]');
                }
            } else {
                appointments = JSON.parse(localStorage.getItem(DETAILS_KEY) || '[]');
            }
            currentAppointments = appointments;
            updateStats();
            renderAppointments();
        }

        function updateStats() {
            const total = currentAppointments.length;
            const pending = currentAppointments.filter(a => !a.status || a.status === 'pending').length;
            const accepted = currentAppointments.filter(a => a.status === 'accepted').length;
            const rejected = currentAppointments.filter(a => a.status === 'rejected').length;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('acceptedCount').textContent = accepted;
            document.getElementById('rejectedCount').textContent = rejected;
        }

        function renderAppointments() {
            const list = document.getElementById('appointmentsList');
            let filtered = currentAppointments;
            if (currentFilter === 'all') {
                filtered = currentAppointments.filter(a => !a.status || a.status === 'pending');
            } else if (currentFilter === 'pending') {
                filtered = currentAppointments.filter(a => !a.status || a.status === 'pending');
            } else if (currentFilter === 'accepted') {
                filtered = currentAppointments.filter(a => a.status === 'accepted');
            } else if (currentFilter === 'rejected') {
                filtered = currentAppointments.filter(a => a.status === 'rejected');
            }

            if (filtered.length === 0) {
                let emptyMsg = currentFilter === 'all' ? "No hay nuevas solicitudes pendientes." : `No se encontraron citas en ${currentFilter}.`;
                list.innerHTML = `<div class="empty-state"><p>${emptyMsg}</p></div>`;
                return;
            }

            filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            list.innerHTML = filtered.map((app) => {
                const status = app.status || 'pending';
                const id = app.fbKey || app.created_at;
                const isPending = status === 'pending';
                const isAccepted = status === 'accepted';
                const isRejected = status === 'rejected';
                const isContact = app.type === 'contact';

                return `
                <div class="appointment-card status-${status} ${isContact ? 'type-contact' : ''}">
                    <div class="status-strip"></div>
                    <div class="card-header">
                        <div>
                            <div style="display: flex; align-items: center; gap: 0.5rem;">
                                <h3>${app.name}</h3>
                                ${isContact ? '<span style="background: #e3f2fd; color: #1976d2; font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: bold;">MENSAJE</span>' : '<span style="background: #f3e5f5; color: #7b1fa2; font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: bold;">CITA</span>'}
                            </div>
                            <span class="date-badge">${isContact ? 'Consulta Directa' : app.date}</span>
                        </div>
                        <span class="status-tag tag-${status}">${status}</span>
                    </div>
                    
                    <div class="info-section">
                        ${!isContact ? `
                        <div class="info-item">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <span>${app.time}</span>
                        </div>
                        ` : `
                        <div class="info-item">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2-2v14a2 2 0 002 2z"></path></svg>
                            <span>Enviado: ${new Date(app.created_at).toLocaleDateString()}</span>
                        </div>
                        `}
                        <div class="info-item">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                            <span>${app.service}</span>
                        </div>
                        <div class="info-item">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                            <span>${app.phone}</span>
                        </div>
                        ${app.address ? `
                        <div class="info-item">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
                            <span>${app.address}</span>
                        </div>
                        ` : ''}
                        ${isContact ? `
                        <div class="info-item">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2-2v12a2 2 0 002 2z"></path></svg>
                            <span>${app.email}</span>
                        </div>
                        ` : ''}
                    </div>

                    <div class="description-box"><strong>${isContact ? 'Mensaje:' : 'Descripción:'}</strong> ${app.description}</div>

                    <div class="actions-grid">
                        ${isPending ? `
                            <button class="btn-dash" style="background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7;" onclick="openMessagingChoice('${id}', 'accepted')">
                                Aceptar
                            </button>
                            <button class="btn-dash" style="background: #fbe9e7; color: #d32f2f; border: 1px solid #ffccbc;" onclick="openMessagingChoice('${id}', 'rejected')">
                                Rechazar
                            </button>
                        ` : ''}
                        ${isAccepted ? `
                            <button class="btn-dash" style="grid-column: span 2; background: #fafafa; color: #666; border: 1px solid #ddd;" onclick="openMessagingChoice('${id}', 'rejected', true)">
                                ${isContact ? 'Archivar Mensaje' : 'Cancelar Cita'}
                            </button>
                        ` : ''}
                        ${isRejected ? `
                            <button class="btn-dash" style="background: #e3f2fd; color: #1976D2; border: 1px solid #90caf9;" onclick="openMessagingChoice('${id}', 'accepted', true)">
                                ${isContact ? 'Restaurar Mensaje' : 'Restaurar y Aceptar'}
                            </button>
                            <button class="btn-dash" style="background: #fdeded; color: #d32f2f; border: 1px solid #ffcdd2;" onclick="confirmDelete('${id}')">
                                Eliminar Permanentemente
                            </button>
                        ` : ''}
                        <button class="btn-dash btn-calendar" onclick="addToAdminCalendar('${id}')">Añadir a mi Calendario</button>
                    </div>
                </div>
            `;}).join('');
        }

        function openMessagingChoice(id, newStatus, isSpecial = false) {
            let app = currentAppointments.find(a => (a.fbKey === id || a.created_at === id));
            if (!app) return;

            const phone = app.phone.replace(/\D/g, '');
            const greeting = getGreetingEN();
            const dateInfo = app.date ? ` on ${app.date}` : '';
            let message = "";

            if (isSpecial) {
                if (newStatus === 'accepted') {
                    message = `${greeting} ${app.name}, this is A+Pereira Company. We are pleased to inform you that we now have availability for your ${app.service} request${dateInfo}. Please let us know if you would like to proceed with confirming this appointment. Best regards.`;
                } else {
                    message = `${greeting} ${app.name}, this is A+Pereira Company. We are writing to formally notify you that your appointment for ${app.service}${dateInfo} has been cancelled. We sincerely apologize for any inconvenience this may cause. Thank you for your understanding.`;
                }
            } else {
                if (newStatus === 'accepted') {
                    message = `${greeting} ${app.name}, this is A+Pereira Company. We are pleased to confirm your request for ${app.service}. Your appointment is officially scheduled for ${app.date || 'the agreed date'} at ${app.time || 'the scheduled time'}. Please let us know if there are any further details we should be aware of. We look forward to serving you.`;
                } else {
                    message = `${greeting} ${app.name}, this is A+Pereira Company. Thank you for your interest in our services. Regrettably, we do not have availability for ${app.date || 'your requested date'} at ${app.time || 'your requested time'}. We kindly invite you to visit our website to view alternative dates. Thank you.`;
                }
            }

            const choiceModal = document.getElementById('choiceModal');
            document.getElementById('choiceMessage').innerHTML = `Acción: <strong>${isSpecial ? (newStatus === 'accepted' ? 'Restaurar' : 'Cancelar') : (newStatus === 'accepted' ? 'Aceptar' : 'Rechazar')}</strong> para <strong>${app.name}</strong>`;
            choiceModal.style.display = 'flex';

            document.getElementById('whatsappBtn').onclick = () => {
                window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
                updateStatus(id, newStatus);
                closeChoiceModal();
            };

            document.getElementById('imessageBtn').onclick = () => {
                window.open(`sms:${phone}&body=${encodeURIComponent(message)}`, '_blank');
                updateStatus(id, newStatus);
                closeChoiceModal();
            };
        }

        function closeChoiceModal() {
            document.getElementById('choiceModal').style.display = 'none';
        }

        async function updateStatus(id, newStatus) {
            if (db) {
                try { await db.ref('appointments/' + id).update({ status: newStatus }); }
                catch (error) { console.error("Firebase error:", error); }
            }
            loadAppointments();
        }

        async function confirmDelete(id) {
            if (confirm("¿Está seguro de que desea eliminar permanentemente este registro? Esta acción no se puede deshacer.")) {
                if (db) {
                    try {
                        await db.ref('appointments/' + id).remove();
                        console.log("Registro eliminado de Firebase");
                    } catch (error) {
                        console.error("Error al eliminar en Firebase:", error);
                    }
                } else {
                    // Fallback for local storage
                    let appointments = JSON.parse(localStorage.getItem(DETAILS_KEY) || '[]');
                    appointments = appointments.filter(a => a.created_at !== id && a.fbKey !== id);
                    localStorage.setItem(DETAILS_KEY, JSON.stringify(appointments));
                }
                loadAppointments();
            }
        }

        function getGreetingEN() {
            const hour = new Date().getHours();
            if (hour >= 5 && hour < 12) return "Good morning";
            if (hour >= 12 && hour < 18) return "Good afternoon";
            return "Good evening";
        }
        function contactViaWhatsApp(id) {
            const app = currentAppointments.find(a => (a.fbKey === id || a.created_at === id));
            if (!app) return;
            const greeting = getGreetingEN();
            let message = app.status === 'accepted'
                ? `${greeting} ${app.name}, this is A+Pereira Company. We are writing to formally confirm that your request for ${app.service} has been accepted. Our team will arrive on ${app.date || 'the agreed date'} at ${app.time || 'the scheduled time'}. Please let us know if you have any additional instructions. Best regards.`
                : `${greeting} ${app.name}, this is A+Pereira Company. We are following up regarding your inquiry about ${app.service}. Would you be available for a brief discussion regarding your project? We look forward to hearing from you.`;
            window.open(`https://wa.me/${app.phone.replace(/\D/g, '')}?text=${encodeURIComponent(message)}`, '_blank');
        }
        function contactViaEmail(id) {
            const app = currentAppointments.find(a => (a.fbKey === id || a.created_at === id));
            if (!app) return;
            const greeting = getGreetingEN();
            let body = app.status === 'accepted'
                ? `${greeting} ${app.name},\n\nThis is a formal confirmation of your appointment with A+Pereira Company.\n\nAppointment Details:\nService: ${app.service}\nDate: ${app.date || 'To be confirmed'}\nTime: ${app.time || 'To be confirmed'}\n\nWe look forward to serving you and appreciate your business.\n\nSincerely,\nThe A+Pereira Company Team`
                : `${greeting} ${app.name},\n\nThank you for reaching out to A+Pereira Company. We are writing to follow up on your inquiry regarding ${app.service}.\n\nWe would like to discuss your requirements in more detail at your earliest convenience.\n\nSincerely,\nThe A+Pereira Company Team`;
            window.location.href = `mailto:${app.email}?subject=${encodeURIComponent('Appointment Update - A+Pereira Company')}&body=${encodeURIComponent(body)}`;
        }
        function addToAdminCalendar(id) {
            const app = currentAppointments.find(a => (a.fbKey === id || a.created_at === id));
            if (!app) return;
            function formatForICS(timeStr) {
                const targetDate = app.dateDB || (app.date ? app.date.split('T')[0] : '');
                if (!targetDate) return '';
                const [year, month, day] = targetDate.split('-');
                let [hours, minutes] = timeStr.split(/:| /);
                if (timeStr.includes('PM') && hours !== '12') hours = parseInt(hours) + 12;
                if (timeStr.includes('AM') && hours === '12') hours = '00';
                return `${year}${month}${day}T${hours}${minutes}00`;
            }
            const start = formatForICS(app.time);
            if (!start) return;
            const icsContent = ['BEGIN:VCALENDAR','VERSION:2.0','BEGIN:VEVENT',`DTSTART:${start}`,`DTEND:${start}`,`SUMMARY:WORK: ${app.service}`,`DESCRIPTION:Client: ${app.name}\\nPhone: ${app.phone}`,`LOCATION:${app.address}`,'END:VEVENT','END:VCALENDAR'].join('\n');
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(new Blob([icsContent], { type: 'text/calendar' }));
            link.setAttribute('download', `Appointment_${app.name.replace(/\s+/g, '_')}.ics`);
            link.click();
        }
        function logout() { sessionStorage.removeItem('isAdmin'); window.location.href = 'index.html'; }
        loadAppointments();
    </script>
</body>
</html>
