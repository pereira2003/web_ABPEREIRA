<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="shortcut icon" href="../img/ABP.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="../img/ABPEREIRA%20L.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | A⁺Pereira Company</title>
    <link rel="stylesheet" href="../styles/style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <style>
        /* --- ESTILO DEL MODAL (IGUAL A LA IMAGEN) --- */
        .custom-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(16, 35, 63, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.3s ease-out;
            display: none; /* Oculto por defecto */
        }

        .modal-content {
            background: #ffffff;
            padding: 2.5rem 2rem;
            border-radius: 32px;
            width: 95%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.35);
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal-header h3 {
            margin: 0 0 1.5rem 0;
            color: #0c3363;
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            font-weight: 700;
        }

        #choiceMessage {
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            color: #1a1a1a;
        }

        .calendar-options {
            background: #f8fafd;
            padding: 1.8rem 1.5rem;
            border-radius: 20px;
            border: 1px solid #e1e8f0;
            margin-top: 1rem;
        }

        .calendar-options p {
            font-weight: 600;
            margin-bottom: 1.2rem;
            font-size: 0.95rem;
            color: #5c6d84;
        }

        .calendar-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .btn-cal {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 0.9rem;
            border: 1.5px solid #d0dbe8;
            border-radius: 14px;
            background: #ffffff;
            color: #2c3e50;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-cal img {
            width: 22px;
            height: 22px;
            object-fit: contain;
        }

        .btn-cal:hover {
            border-color: #0c3363;
            background: #f0f7ff;
            transform: translateY(-2px);
        }

        .btn-close-modal {
            width: 100%;
            padding: 1.1rem;
            background: #0c3363;
            color: #ffffff;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1.5rem;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- RESTO DEL ESTILO DASHBOARD --- */

        :root {
            --primary: #0c3363;
            --accent: #be945d;
            --bg: #f4f7fa;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #667;
            --danger: #d32f2f;
            --success: #2e7d32;
            --warning: #ed6c02;
            --wa-color: #25D366;
            --im-color: #34C759;
        }

        body {
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            margin: 0;
            color: var(--text-main);
        }

        .dashboard-container {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: var(--primary);
            padding: 1.5rem;
            border-radius: 20px;
            color: white;
            box-shadow: 0 10px 30px rgba(12, 51, 99, 0.2);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header h1 {
            margin: 0;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
        }

        .stats-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1.2rem;
            border-radius: 15px;
            flex: 1;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .stat-card.active {
            border-color: var(--accent);
            background: #fffdfa;
        }

        .stat-card strong {
            font-size: 1.5rem;
            color: var(--primary);
        }

        .stat-card.active strong {
            color: var(--accent);
        }

        /* --- TAB SYSTEM --- */
        .tabs-nav {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #e1e8f0;
            padding-bottom: 0.5rem;
            overflow-x: auto;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none;  /* IE and Edge */
            -webkit-overflow-scrolling: touch;
        }

        .tabs-nav::-webkit-scrollbar {
            display: none; /* Chrome, Safari and Opera */
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 0.8rem 1.2rem;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .tab-btn:hover {
            color: var(--primary);
        }

        .tab-btn.active {
            color: var(--primary);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -0.7rem;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--primary);
            border-radius: 10px;
        }

        .tab-pane {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .tab-pane.active {
            display: block;
        }

        /* --- SERVICES MANAGEMENT UI --- */
        .services-manager {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        .service-form-card {
            background: white;
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .service-form-card h2 {
            margin-top: 0;
            font-family: 'Cormorant Garamond', serif;
            color: var(--primary);
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 0.8rem;
            border: 1.5px solid #e1e8f0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* --- DRAG & DROP UPLOAD --- */
        .upload-area {
            border: 2px dashed #d0dbe8;
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8fafd;
            position: relative;
            overflow: hidden;
        }

        .upload-area:hover, .upload-area.drag-over {
            border-color: var(--primary);
            background: #f0f7ff;
        }

        .upload-area svg {
            width: 32px;
            height: 32px;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .upload-area p {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .upload-preview {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 1rem;
            display: none;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: #e1e8f0;
            border-radius: 10px;
            margin-top: 1rem;
            display: none;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--primary);
            border-radius: 10px;
            transition: width 0.2s;
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background: #082547;
        }

        .btn-cancel-edit {
            width: 100%;
            padding: 0.8rem;
            background: #f1f3f5;
            color: #495057;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            display: none;
        }

        .services-list-admin {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .service-admin-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .service-admin-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: #f1f3f5;
        }

        .service-admin-info {
            padding: 1.2rem;
            flex-grow: 1;
        }

        .service-admin-info h3 {
            margin: 0 0 0.5rem 0;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            color: var(--primary);
        }

        .service-admin-info p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .service-admin-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 0.8rem;
            gap: 0.5rem;
            background: #f8fafd;
            border-top: 1px solid #e1e8f0;
        }

        /* --- SERVICES LIST (Match public style) --- */
        .services-list-admin {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .service-card-admin {
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 28px;
            background: #ffffff;
            border: 1px solid #eef3f8;
            box-shadow: 0 14px 44px rgba(16, 35, 63, 0.06);
            transition: transform 0.22s ease, box-shadow 0.22s ease;
        }

        .service-card-admin:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 50px rgba(16, 35, 63, 0.12);
        }

        .admin-service-img-wrap {
            width: 100%;
            height: 200px;
            overflow: hidden;
            background: #f1f3f5;
        }

        .admin-service-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .admin-service-content {
            display: flex;
            flex-direction: column;
            padding: 1.4rem;
            flex-grow: 1;
            gap: 0.8rem;
        }

        .admin-service-tag {
            display: inline-flex;
            padding: 0.25rem 0.65rem;
            border-radius: 999px;
            background: #eef3f8;
            color: #5f7390;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            width: fit-content;
        }

        .admin-service-title {
            margin: 0;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            color: var(--primary);
            line-height: 1.1;
        }

        .admin-service-pricing {
            font-size: 0.75rem;
            color: #a0a0a0;
            font-style: italic;
            margin-top: -0.3rem;
        }

        .admin-service-desc {
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .admin-service-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
            margin-top: auto;
            padding-top: 1rem;
        }

        .btn-admin-edit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.6rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-admin-delete {
            background: #fdeded;
            color: var(--danger);
            border: none;
            padding: 0.6rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-admin-edit:hover { background: #082547; transform: translateY(-2px); }
        .btn-admin-delete:hover { background: #fcdcdc; transform: translateY(-2px); }

        /* Mobile adjustments for Admin List (Match public mobile) */
        @media (max-width: 640px) {
            .services-list-admin {
                grid-template-columns: 1fr;
                gap: 0.8rem;
            }

            .service-card-admin {
                flex-direction: row;
                border-radius: 16px;
                min-height: 120px;
            }

            .admin-service-img-wrap {
                width: 112px;
                height: auto;
                flex-shrink: 0;
            }

            .admin-service-img-wrap img {
                height: 100%;
                width: 100%;
                position: absolute;
                inset: 0;
            }

            .service-card-admin {
                position: relative;
            }

            .admin-service-img-wrap {
                position: relative;
                min-height: 112px;
            }

            .admin-service-content {
                padding: 0.8rem 1rem;
                gap: 0.3rem;
            }

            .admin-service-title {
                font-size: 1.1rem;
            }

            .admin-service-desc {
                display: none;
            }

            .admin-service-tag {
                font-size: 0.6rem;
                padding: 0.15rem 0.5rem;
                margin-bottom: 0.1rem;
            }

            .admin-service-actions {
                padding-top: 0.4rem;
                gap: 0.4rem;
            }

            .btn-admin-edit, .btn-admin-delete {
                padding: 0.4rem;
                font-size: 0.7rem;
                border-radius: 8px;
            }
            .service-form-card {
                padding: 1.5rem;
                border-radius: 20px;
            }
            .form-group label {
                font-size: 0.8rem;
            }
            .form-group input, .form-group textarea {
                padding: 0.7rem;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 1024px) {
            .services-manager {
                grid-template-columns: 1fr;
            }
            .service-form-card {
                position: static;
            }
        }

        .appointments-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        @media (max-width: 768px) {
            .dashboard-container { padding: 1rem; }
            .header { 
                flex-direction: column; 
                text-align: center; 
                padding: 1.5rem 1rem;
                gap: 1.2rem;
                border-radius: 24px;
            }
            .header div { 
                flex-direction: column;
                gap: 0.6rem !important;
            }
            .header img {
                width: 50px !important;
            }
            .header h1 {
                font-size: 1.5rem;
            }
            .btn-logout {
                width: 100%;
                max-width: 150px;
            }
            .stats-bar { 
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 0.6rem;
            }
            .stat-card {
                padding: 0.8rem;
                border-radius: 12px;
                min-height: 80px;
                justify-content: center;
            }
            .stat-card span {
                font-size: 0.75rem;
            }
            .stat-card strong {
                font-size: 1.1rem;
            }
            .appointments-grid { 
                grid-template-columns: 1fr; 
                gap: 1rem;
            }
            .appointment-card { 
                padding: 1.2rem; 
                border-radius: 20px;
            }
            .card-header h3 {
                font-size: 1.2rem;
            }
            .actions-grid { 
                grid-template-columns: 1fr; 
                gap: 0.6rem;
            }
            .btn-dash {
                padding: 1rem;
                font-size: 0.9rem;
            }
            .btn-calendar { 
                grid-column: span 1; 
            }
        }

        .appointment-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .appointment-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }

        .status-strip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: #ddd;
        }

        .status-pending .status-strip { background: var(--warning); }
        .status-accepted .status-strip { background: var(--success); }
        .status-rejected .status-strip { background: var(--danger); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }

        .card-header h3 {
            margin: 0;
            font-size: 1.4rem;
            color: var(--primary);
            font-family: 'Cormorant Garamond', serif;
        }

        .status-tag {
            padding: 0.3rem 0.7rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .tag-pending { background: #fff4e5; color: var(--warning); }
        .tag-accepted { background: #edf7ed; color: var(--success); }
        .tag-rejected { background: #fdeded; color: var(--danger); }

        .date-badge {
            background: #e8f0fe;
            color: var(--primary);
            padding: 0.4rem 0.8rem;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-top: 0.5rem;
            display: inline-block;
        }

        .info-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.95rem;
        }

        .info-item svg {
            width: 18px;
            height: 18px;
            color: var(--accent);
            flex-shrink: 0;
        }

        .description-box {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #444;
            margin-top: 1rem;
            border-left: 3px solid #ddd;
        }

        .actions-grid {
            margin-top: 1.5rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
        }

        .btn-dash {
            padding: 0.7rem;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .btn-dash img {
            width: 16px;
            height: 16px;
        }

        .btn-accept-wa { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        .btn-accept-im { background: #e8f5e9; color: #34C759; border: 1px solid #a5d6a7; }
        .btn-reject-wa { background: #ed6c02; color: white; border: none; }
        .btn-reject-im { background: #ffffff; color: #1976d2; border: 1px solid #ddd; }

        .btn-accept-wa:hover { background: #c8e6c9; }
        .btn-accept-im:hover { background: #bbdefb; }
        .btn-reject-wa:hover { background: #e65100; }
        .btn-reject-im:hover { background: #f5f5f5; }

        .btn-calendar {
            grid-column: span 2;
            background: #fff8e1;
            color: #b58105;
            border: 1px solid #ffeeba;
        }
        .btn-calendar:hover { background: #ffecb3; }

        .btn-logout {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            grid-column: 1 / -1;
            padding: 5rem;
            color: var(--text-muted);
        }

        /* FormSubmit hidden helper */
        #emailTrigger { display: none; }
    </style>
</head>
<body>
    <!-- Modal de Selección de App (IGUAL A LA IMAGEN) -->
    <div id="choiceModal" class="custom-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Select Messaging App</h3>
            </div>
            <div class="modal-body">
                <div id="choiceMessage">
                    <!-- Dinámico -->
                </div>
                <div class="calendar-options">

        const firebaseConfig = {

        // Initialize Firebase

            firebase.initializeApp(firebaseConfig);

        const DETAILS_KEY = 'abp_booked_details';

        let currentAppointments = []; // Global store for loaded appointments
        let currentFilter = 'all'; // Global filter state

        let selectedFile = null; // Store the file to be uploaded

        // --- UPLOAD LOGIC ---
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('sImageFile');
        const imgPreview = document.getElementById('imgPreview');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleFileSelect(file);
            }
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleFileSelect(file);
        });

        function handleFileSelect(file) {
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                imgPreview.src = e.target.result;
                imgPreview.style.display = 'block';
                uploadArea.querySelector('svg').style.display = 'none';
                uploadArea.querySelector('p').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        async function uploadImage() {
            if (!selectedFile || !storage) return null;
            
            const fileName = `services/${Date.now()}_${selectedFile.name}`;
            const storageRef = storage.ref(fileName);
            const progressContainer = document.getElementById('uploadProgressContainer');
            const progressBar = document.getElementById('uploadProgressBar');
            
            progressContainer.style.display = 'block';
            
            return new Promise((resolve, reject) => {
                const uploadTask = storageRef.put(selectedFile);
                
                uploadTask.on('state_changed', 
                    (snapshot) => {
                        const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                        progressBar.style.width = progress + '%';
                    }, 
                    (error) => {
                        console.error("Upload error:", error);
                        progressContainer.style.display = 'none';
                        reject(error);
                    }, 
                    async () => {
                        const downloadURL = await uploadTask.snapshot.ref.getDownloadURL();
                        progressContainer.style.display = 'none';
                        resolve(downloadURL);
                    }
                );
            });
        }

        function switchTab(tab) {

            // Add active class to the target pane
            const targetPane = document.getElementById(`tab-${tab}`);
            if (targetPane) targetPane.classList.add('active');

            // Find and activate the correct button using a data attribute or specific check
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => {
                const btnText = btn.textContent.toLowerCase();
                if (
                    (tab === 'citas' && btnText.includes('registros')) ||

                console.error("Error loading services:", error);

        serviceForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!db) return;

            const id = document.getElementById('editServiceId').value;
            const btnSave = document.getElementById('btnSaveService');
            const originalBtnText = btnSave.textContent;
            
            btnSave.disabled = true;
            btnSave.textContent = "Procesando...";

            try {
                // 1. Handle image (Upload if file selected, otherwise use existing from preview)
                let finalImageUrl = imgPreview.src;
                
                if (selectedFile) {
                    finalImageUrl = await uploadImage();
                }

                if (!finalImageUrl || finalImageUrl === window.location.href) {
                    alert("Por favor selecciona una imagen.");
                    btnSave.disabled = false;
                    btnSave.textContent = originalBtnText;
                    return;
                }

                const serviceData = {
                    title: document.getElementById('sTitle').value,
                    tag: document.getElementById('sTag').value,
                    pricing_note: document.getElementById('sPricing').value,
                    description: document.getElementById('sDesc').value,
                    full_description: document.getElementById('sFullDesc').value,
                    image: finalImageUrl,
                    updated_at: new Date().toISOString()

                if (id) {
                    await db.ref(`services_catalog/${id}`).update(serviceData);
                    alert("Servicio actualizado correctamente.");

                } else {
                    serviceData.created_at = new Date().toISOString();
                    await db.ref('services_catalog').push(serviceData);
                    alert("Servicio agregado correctamente.");

                resetServiceForm();
                loadServices();
            } catch (error) {
                console.error("Error saving service:", error);
                alert("Error al guardar el servicio.");
            } finally {
                btnSave.disabled = false;
                btnSave.textContent = originalBtnText;
            }
        });

            const s = currentServices.find(srv => srv.id === id);

            document.getElementById('sDesc').value = s.description;
            document.getElementById('sFullDesc').value = s.full_description || '';
            
            // Show current image in preview
            imgPreview.src = s.image;

            uploadArea.querySelector('svg').style.display = 'none';

            document.getElementById('btnSaveService').textContent = "Actualizar Servicio";
            document.getElementById('btnCancelEdit').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });

                        ${isContact ? `

                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2-2v12a2 2 0 002 2z"></path></svg>
                            <span>${app.email}</span>
                        </div>
                        ` : ''}
                    </div>

                    <div class="description-box"><strong>${isContact ? 'Mensaje:' : 'Descripción:'}</strong> ${app.description}</div>

                    <div class="actions-grid">
                        ${isPending ? `
                            <button class="btn-dash" style="background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7;" onclick="openMessagingChoice('${id}', 'accepted')">
                                Aceptar
                            </button>
                            <button class="btn-dash" style="background: #fbe9e7; color: #d32f2f; border: 1px solid #ffccbc;" onclick="openMessagingChoice('${id}', 'rejected')">
                                Rechazar
                            </button>
                        ` : ''}
                        ${isAccepted ? `
                            <button class="btn-dash" style="grid-column: span 2; background: #fafafa; color: #666; border: 1px solid #ddd;" onclick="openMessagingChoice('${id}', 'rejected', true)">
                                ${isContact ? 'Archivar Mensaje' : 'Cancelar Cita'}
                            </button>
                        ` : ''}
                        ${isRejected ? `
                            <button class="btn-dash" style="background: #e8f5e9; color: #34C759; border: 1px solid #a5d6a7;" onclick="openMessagingChoice('${id}', 'accepted', true)">
                                ${isContact ? 'Restaurar Mensaje' : 'Restaurar y Aceptar'}
                            </button>
                            <button class="btn-dash" style="background: #fdeded; color: #d32f2f; border: 1px solid #ffcdd2;" onclick="confirmDelete('${id}')">
                                Eliminar Permanentemente
                            </button>
                        ` : ''}
                        <button class="btn-dash btn-calendar" onclick="addToAdminCalendar('${id}')">Añadir a mi Calendario</button>
                    </div>
                </div>
            `;}).join('');
        }

        function openMessagingChoice(id, newStatus, isSpecial = false) {
            let app = currentAppointments.find(a => (a.fbKey === id || a.created_at === id));
            if (!app) return;

            const phone = app.phone.replace(/\D/g, '');
            const greeting = getGreetingEN();
            const dateInfo = app.date ? ` on ${app.date}` : '';
            const timeInfo = app.time ? ` at ${app.time}` : '';
            let message = "";

            if (isSpecial) {
                if (newStatus === 'accepted') {
                    message = `${greeting} ${app.name}, this is A⁺Pereira Company. We are pleased to inform you that we now have availability for your ${app.service} request${dateInfo}${timeInfo}. Please let us know if you would like to proceed with confirming this appointment. Best regards.`;
                } else {
                    message = `${greeting} ${app.name}, this is A⁺Pereira Company. We are writing to formally notify you that your appointment for ${app.service}${dateInfo}${timeInfo} has been cancelled. We sincerely apologize for any inconvenience this may cause. Thank you for your understanding.`;
                }
            } else {
                if (newStatus === 'accepted') {
                    message = `${greeting} ${app.name}, this is A⁺Pereira Company. We are pleased to confirm your request for ${app.service}. Your appointment is officially scheduled for ${app.date || 'the agreed date'}${timeInfo || ' at the scheduled time'}. Please let us know if there are any further details we should be aware of. We look forward to serving you.`;
                } else {
                    message = `${greeting} ${app.name}, this is A⁺Pereira Company. Thank you for your interest in our services. Regrettably, we do not have availability for ${app.date || 'your requested date'}${timeInfo || ' at your requested time'}. We kindly invite you to visit our website to view alternative dates. Thank you.`;
                }
            }

            const choiceModal = document.getElementById('choiceModal');
            document.getElementById('choiceMessage').innerHTML = `Acción: <strong>${isSpecial ? (newStatus === 'accepted' ? 'Restaurar' : 'Cancelar') : (newStatus === 'accepted' ? 'Aceptar' : 'Rechazar')}</strong> para <strong>${app.name}</strong>`;
            choiceModal.style.display = 'flex';

            document.getElementById('whatsappBtn').onclick = () => {
                window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
                updateStatus(id, newStatus);
                closeChoiceModal();
            };

            document.getElementById('imessageBtn').onclick = () => {
                window.open(`sms:${phone}&body=${encodeURIComponent(message)}`, '_blank');
                updateStatus(id, newStatus);
                closeChoiceModal();
            };
        }

        function closeChoiceModal() {
            document.getElementById('choiceModal').style.display = 'none';
        }

        async function updateStatus(id, newStatus) {
            if (db) {
                try { await db.ref('appointments/' + id).update({ status: newStatus }); }
                catch (error) { console.error("Firebase error:", error); }
            }
            loadAppointments();
        }

        async function confirmDelete(id) {
            if (confirm("¿Está seguro de que desea eliminar permanentemente este registro? Esta acción no se puede deshacer.")) {
                if (db) {
                    try {
                        await db.ref('appointments/' + id).remove();
                        console.log("Registro eliminado de Firebase");
                    } catch (error) {
                        console.error("Error al eliminar en Firebase:", error);
                    }
                } else {
                    // Fallback for local storage
                    let appointments = JSON.parse(localStorage.getItem(DETAILS_KEY) || '[]');
                    appointments = appointments.filter(a => a.created_at !== id && a.fbKey !== id);
                    localStorage.setItem(DETAILS_KEY, JSON.stringify(appointments));
                }
                loadAppointments();
            }
        }

        function getGreetingEN() {
            const hour = new Date().getHours();
            if (hour >= 5 && hour < 12) return "Good morning";
            if (hour >= 12 && hour < 18) return "Good afternoon";
            return "Good evening";
        }
        function contactViaWhatsApp(id) {
            const app = currentAppointments.find(a => (a.fbKey === id || a.created_at === id));
            if (!app) return;
            const greeting = getGreetingEN();
            const dateInfo = app.date ? ` on ${app.date}` : '';
            const timeInfo = app.time ? ` at ${app.time}` : '';
            let message = app.status === 'accepted'
                ? `${greeting} ${app.name}, this is A⁺Pereira Company. We are writing to formally confirm that your request for ${app.service} has been accepted. Our team will arrive${dateInfo}${timeInfo}. Please let us know if you have any additional instructions. Best regards.`
                : `${greeting} ${app.name}, this is A⁺Pereira Company. We are following up regarding your inquiry about ${app.service}. Would you be available for a brief discussion regarding your project? We look forward to hearing from you.`;
            window.open(`https://wa.me/${app.phone.replace(/\D/g, '')}?text=${encodeURIComponent(message)}`, '_blank');
        }
        function contactViaEmail(id) {
            const app = currentAppointments.find(a => (a.fbKey === id || a.created_at === id));
            if (!app) return;
            const greeting = getGreetingEN();
            const dateInfo = app.date || 'To be confirmed';
            const timeInfo = app.time || 'To be confirmed';
            let body = app.status === 'accepted'
                ? `${greeting} ${app.name},\n\nThis is a formal confirmation of your appointment with A⁺Pereira Company.\n\nAppointment Details:\nService: ${app.service}\nDate: ${dateInfo}\nTime: ${timeInfo}\n\nWe look forward to serving you and appreciate your business.\n\nSincerely,\nThe A⁺Pereira Company Team`
                : `${greeting} ${app.name},\n\nThank you for reaching out to A⁺Pereira Company. We are writing to follow up on your inquiry regarding ${app.service}.\n\nWe would like to discuss your requirements in more detail at your earliest convenience.\n\nSincerely,\nThe A⁺Pereira Company Team`;
            window.location.href = `mailto:${app.email}?subject=${encodeURIComponent('Appointment Update - A⁺Pereira Company')}&body=${encodeURIComponent(body)}`;
        }
        function addToAdminCalendar(id) {
            const app = currentAppointments.find(a => (a.fbKey === id || a.created_at === id));
            if (!app) return;
            function formatForICS(timeStr) {
                const targetDate = app.dateDB || (app.date ? app.date.split('T')[0] : '');
                if (!targetDate) return '';
                const [year, month, day] = targetDate.split('-');
                let [hours, minutes] = timeStr.split(/:| /);
                if (timeStr.includes('PM') && hours !== '12') hours = parseInt(hours) + 12;
                if (timeStr.includes('AM') && hours === '12') hours = '00';
                return `${year}${month}${day}T${hours}${minutes}00`;
            }
            const start = formatForICS(app.time);
            if (!start) return;
            const icsContent = ['BEGIN:VCALENDAR','VERSION:2.0','BEGIN:VEVENT',`DTSTART:${start}`,`DTEND:${start}`,`SUMMARY:WORK: ${app.service}`,`DESCRIPTION:Client: ${app.name}\\nPhone: ${app.phone}`,`LOCATION:${app.address}`,'END:VEVENT','END:VCALENDAR'].join('\n');
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(new Blob([icsContent], { type: 'text/calendar' }));
            link.setAttribute('download', `Appointment_${app.name.replace(/\s+/g, '_')}.ics`);
            link.click();
        }
        function logout() { sessionStorage.removeItem('isAdmin'); window.location.href = 'index.html'; }
        
        // Initial load
        loadAppointments();
        loadServices();
    </script>
    <!-- Tutorial Interactivo (Driver.js) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.css"/>
    <script src="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.js.iife.js"></script>
    <style>
        @keyframes softPop {
            0% { opacity: 0; transform: translateY(10px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .driver-popover {
            border-radius: 15px;
            font-family: 'Inter', sans-serif;
            padding: 15px;
            animation: softPop 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2) !important;
        }
        .driver-popover-title {
            color: var(--primary);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .driver-popover-description {
            color: #555;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .driver-popover-next-btn, .driver-popover-prev-btn {
            border-radius: 8px !important;
            text-shadow: none !important;
            font-weight: bold !important;
            transition: all 0.3s ease !important;
        }
        .driver-popover-next-btn {
            background-color: var(--primary) !important;
            color: white !important;
            border: none !important;
        }
        .driver-popover-next-btn:hover {
            background-color: #082547 !important;
            transform: translateY(-2px);
        }
        .driver-popover-close-btn {
            color: #999;
            transition: color 0.3s;
        }
        .driver-popover-close-btn:hover {
            color: #333;
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const driver = window.driver.js.driver;
            
            const driverObj = driver({
                showProgress: true,
                animate: true,
                nextBtnText: 'Siguiente',
                prevBtnText: 'Anterior',
                doneBtnText: '¡Entendido!',
                progressText: 'Paso {{current}} de {{total}}',
                allowClose: true,
                onHighlightStarted: (element, step) => {
                    // Detectar a qué pestaña pertenece el elemento resaltado
                    if (step.element === '#tab-registrar') {
                        switchTab('registrar');
                    } else if (step.element === '#tab-servicios') {
                        switchTab('servicios');
                    } else if (step.element === '#tab-citas' || step.element === '#appointmentsList' || step.element === '.stats-bar') {
                        switchTab('citas');
                    }
                },
                onPopoverRender: (popover, { config, state }) => {
                    if (!popover.footer.querySelector('.driver-skip-btn')) {
                        const skipBtn = document.createElement('button');
                        skipBtn.className = 'driver-skip-btn';
                        skipBtn.innerText = 'Omitir';
                        skipBtn.style.cssText = 'background: transparent; border: none; color: #999; font-weight: 600; cursor: pointer; padding: 0.5rem; margin-right: auto; font-size: 0.9rem; text-decoration: underline;';
                        skipBtn.onclick = () => { driverObj.destroy(); };
                        popover.footer.style.display = 'flex';
                        popover.footer.style.alignItems = 'center';
                        popover.footer.insertBefore(skipBtn, popover.footer.firstChild);
                    }
                },
                steps: [
                    { 
                        popover: { 
                            title: 'Bienvenido al Panel Administrador', 
                            description: 'Este es tu centro de control de A⁺Pereira. Vamos a dar un rápido recorrido para que conozcas todas las herramientas disponibles.' 
                        } 
                    },
                    { 
                        element: '.header', 
                        popover: { 
                            title: 'Cabecera Principal', 
                            description: 'Aquí puedes ver el logo de la empresa y tienes el botón para cerrar la sesión de forma segura cuando termines.', 
                            side: "bottom", 
                            align: 'start' 
                        }
                    },
                    { 
                        element: '.stats-bar', 
                        popover: { 
                            title: 'Resumen y Filtros', 
                            description: 'Estas tarjetas te muestran el volumen de solicitudes actuales. Además, ¡funcionan como filtros! Haz clic en cualquiera de ellas para ver únicamente las citas Pendientes, Aceptadas o Rechazadas.', 
                            side: "bottom", 
                            align: 'center' 
                        }
                    },
                    { 
                        element: '.tabs-nav', 
                        popover: { 
                            title: 'Navegación por Pestañas', 
                            description: 'Ahora tienes tres secciones: <b>Registros Citas</b> para tus solicitudes, <b>Registrar Servicios</b> para subir nuevos trabajos, y <b>Ajuste de Servicios</b> para gestionar lo existente.', 
                            side: "bottom", 
                            align: 'center' 
                        }
                    },
                    { 
                        element: '#tab-registrar', 
                        popover: { 
                            title: 'Crea Nuevos Servicios', 
                            description: 'En esta pestaña puedes agregar títulos, categorías y descripciones. ¡No olvides que ahora puedes <b>arrastrar tus imágenes</b> directamente aquí!', 
                            side: "top", 
                            align: 'center' 
                        }
                    },
                    { 
                        element: '#tab-servicios', 
                        popover: { 
                            title: 'Gestiona tu Catálogo', 
                            description: 'Aquí verás todos tus servicios con el mismo estilo que tus clientes. Puedes <b>Editar</b> para cambiar detalles o <b>Eliminar</b> si ya no los ofreces.', 
                            side: "top", 
                            align: 'center' 
                        }
                    },
                    { 
                        element: '#appointmentsList', 
                        popover: { 
                            title: 'Gestión de Citas', 
                            description: 'Aquí aparecerán las tarjetas con los datos de los clientes. Vamos a ver las herramientas disponibles para cada una.', 
                            side: "top", 
                            align: 'start' 
                        }
                    },
                    {
                        element: '.appointment-card:first-child .address-link',
                        popover: {
                            title: 'Navegación Inteligente',
                            description: 'Si el cliente incluyó su dirección, al hacer clic en este enlace se abrirá automáticamente en Google Maps o Apple Maps para que veas la ubicación exacta.',
                            side: "top",
                            align: 'center'
                        }
                    },
                    {
                        element: '.appointment-card:first-child .actions-grid',
                        popover: {
                            title: 'Botones de Acción y Estado',
                            description: 'Con estos botones puedes Aceptar o Rechazar rápidamente la solicitud. Una vez aceptada, te permitirá notificar al cliente directamente a su WhatsApp o iMessage con un solo clic.',
                            side: "bottom",
                            align: 'center'
                        }
                    },
                    {
                        element: '.appointment-card:first-child .btn-calendar',
                        popover: {
                            title: 'Sincronizar Calendario',
                            description: '¡Nunca olvides una cita! Este botón exporta los datos y te permite agregar el evento automáticamente a tu calendario personal (Google Calendar, Outlook o Apple Calendar).',
                            side: "top",
                            align: 'center'
                        }
                    }
                ]
            });

            // Dar un pequeño tiempo para que el DOM (como citas cacheadas) se asiente
            setTimeout(() => {
                driverObj.drive();
            }, 800);
        });
    </script>
