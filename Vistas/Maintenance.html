<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mantenimiento | A⁺Pereira Company</title>
    <link rel="icon" type="image/x-icon" href="../img/ABP.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0c3363;
            --accent: #be945d;
            --text: #1a1a1a;
            --bg: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            text-align: center;
            color: var(--text);
        }

        .container {
            padding: 2rem;
            max-width: 800px;
            width: 90%;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            color: var(--primary);
            margin: 0;
            letter-spacing: -1px;
        }

        p {
            font-size: 1.2rem;
            color: #555;
            margin: 1rem 0 4rem;
            font-weight: 300;
        }

        /* --- ESCENA PROFESIONAL DE ESPERA --- */
        .scene {
            position: relative;
            height: 300px;
            width: 100%;
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .maintenance-illustration {
            width: 280px;
            height: 280px;
            position: relative;
        }

        /* Estilo de la ilustración (Blanco y Negro como la imagen) */
        .tech-body { fill: #ffffff; stroke: #000000; stroke-width: 2; }
        .tech-dark { fill: #000000; }
        .tech-accent { fill: var(--accent); stroke: #000000; stroke-width: 1; }

        /* Animación suave de espera */
        .waiting-tech {
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Parpadeo del ojo para dar vida */
        .eye {
            animation: blink 4s infinite;
        }

        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }

        /* La llave se mueve un poco */
        .wrench-wait {
            transform-origin: 165px 175px;
            animation: wrenchMove 4s ease-in-out infinite;
        }

        @keyframes wrenchMove {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(5deg); }
        }

        /* Brillo sutil */
        .glow-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, rgba(190, 148, 93, 0.1) 0%, rgba(255,255,255,0) 70%);
            z-index: -1;
            animation: pulseGlow 3s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }

        /* --- LOADER MODERNO --- */
        .status-loader {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 2rem;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 50%;
            animation: dotWave 1.2s infinite ease-in-out;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotWave {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
            40% { transform: translateY(-15px); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="scene">
            <div class="glow-circle"></div>
            <div class="maintenance-illustration">
                <svg viewBox="0 0 250 250" class="waiting-tech">
                    <!-- Sombra en el suelo -->
                    <ellipse cx="125" cy="230" rx="60" ry="10" fill="rgba(0,0,0,0.05)" />
                    
                    <!-- Cuerpo del Técnico -->
                    <path class="tech-dark" d="M60 220 Q60 140 125 140 Q190 140 190 220 Z" /> <!-- Espalda/Torso -->
                    <path class="tech-body" d="M80 220 Q80 160 125 160 Q170 160 170 220 Z" /> <!-- Overol -->
                    
                    <!-- Cabeza y Casco -->
                    <circle class="tech-body" cx="125" cy="110" r="40" /> <!-- Cara -->
                    <path class="tech-dark" d="M85 110 A40 40 0 0 1 165 110 L170 115 L80 115 Z" /> <!-- Base Casco -->
                    <path class="tech-dark" d="M90 100 A35 45 0 0 1 160 100 Z" /> <!-- Parte superior Casco -->
                    
                    <!-- Ojos -->
                    <circle class="tech-dark eye" cx="110" cy="115" r="3" />
                    <circle class="tech-dark eye" cx="140" cy="115" r="3" />
                    
                    <!-- Brazo y Llave -->
                    <path class="tech-dark" d="M170 180 Q190 180 195 210" stroke-width="8" stroke="black" fill="none" /> <!-- Brazo -->
                    <g class="wrench-wait">
                        <rect x="185" y="160" width="10" height="40" rx="2" class="tech-dark" />
                        <circle cx="190" cy="160" r="10" class="tech-dark" />
                        <circle cx="190" cy="160" r="4" fill="white" />
                        <rect x="188" y="150" width="4" height="12" fill="white" transform="rotate(45, 190, 160)" />
                    </g>
                    
                    <!-- Caja de Herramientas al lado -->
                    <g transform="translate(30, 180)">
                        <rect x="0" y="20" width="45" height="30" rx="3" class="tech-dark" />
                        <path d="M10 20 V10 H35 V20" fill="none" stroke="black" stroke-width="3" />
                        <rect x="18" y="30" width="9" height="7" rx="1" fill="white" />
                    </g>
                </svg>
            </div>
        </div>
        
        <h1>Under Maintenance</h1>
        <p>Our expert technician is preparing the tools to improve your experience. We'll be back online shortly.</p>
        
        <div class="status-loader">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <!-- Firebase para monitorear estado -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD6h6fErJd-nVhvxsTyBdJmkqLMzzR4rOk",
            authDomain: "abpereira-web.firebaseapp.com",
            databaseURL: "https://abpereira-web-default-rtdb.firebaseio.com",
            projectId: "abpereira-web",
            storageBucket: "abpereira-web.firebasestorage.app",
            messagingSenderId: "270636168434",
            appId: "1:270636168434:web:046c7d9bc4d55aaececc6b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Si el mantenimiento se desactiva, volver al inicio
        db.ref('settings/maintenance').on('value', (snapshot) => {
            if (snapshot.val() === false) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
