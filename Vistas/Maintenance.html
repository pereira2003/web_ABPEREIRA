<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mantenimiento | A⁺Pereira Company</title>
    <link rel="icon" type="image/x-icon" href="../img/ABP.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0c3363;
            --accent: #be945d;
            --text: #1a1a1a;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f4f7fa;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .container {
            padding: 2rem;
            max-width: 600px;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.2rem;
            color: #667;
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        /* --- ANIMACIÓN --- */
        .animation-box {
            position: relative;
            height: 180px;
            width: 100%;
            margin-bottom: 2rem;
            background: rgba(12, 51, 99, 0.03);
            border-radius: 20px;
            overflow: hidden;
        }

        /* Personaje SVG (Blanco y Negro) */
        .worker-svg {
            position: absolute;
            left: -100px;
            bottom: 20px;
            width: 80px;
            height: 80px;
            animation: run 4s linear infinite;
        }

        /* Caja de herramientas SVG */
        .toolbox-svg {
            position: absolute;
            right: 20px;
            bottom: 20px;
            width: 60px;
            height: 60px;
        }

        @keyframes run {
            0% { 
                left: -100px; 
                transform: scaleX(1) translateY(0); 
            }
            45% { 
                left: calc(100% - 100px); 
                transform: scaleX(1) translateY(-5px); 
            }
            50% { 
                left: calc(100% - 100px); 
                transform: scaleX(-1) translateY(0); 
            }
            95% { 
                left: -100px; 
                transform: scaleX(-1) translateY(-5px); 
            }
            100% { 
                left: -100px; 
                transform: scaleX(1) translateY(0); 
            }
        }

        /* Efecto de correr (rebote) */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .worker-svg svg {
            animation: bounce 0.3s ease-in-out infinite;
        }

        /* --- LOADER --- */
        .loader {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 5px solid rgba(12, 51, 99, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
            margin-top: 2rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="animation-box">
            <div class="worker-svg">
                <!-- Personaje Blanco y Negro (Estilo Minimalista) con Llave -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="7" r="4"></circle>
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <rect x="14" y="12" width="6" height="6" rx="1" fill="white" stroke="black"></rect>
                    <path d="M16 14l2 2m0-2l-2 2" stroke="black"></path>
                </svg>
            </div>
            <div class="toolbox-svg">
                <!-- Caja de herramientas Blanco y Negro -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 20h12a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2z"></path>
                    <path d="M16 6V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"></path>
                    <line x1="4" y1="11" x2="20" y2="11"></line>
                </svg>
            </div>
        </div>
        
        <h1>Estamos en mantenimiento</h1>
        <p>En unos momentos volveremos a estar activos.<br>Estamos trabajando para mejorar tu experiencia.</p>
        
        <div class="loader"></div>
    </div>

    <!-- Firebase para monitorear estado -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD6h6fErJd-nVhvxsTyBdJmkqLMzzR4rOk",
            authDomain: "abpereira-web.firebaseapp.com",
            databaseURL: "https://abpereira-web-default-rtdb.firebaseio.com",
            projectId: "abpereira-web",
            storageBucket: "abpereira-web.firebasestorage.app",
            messagingSenderId: "270636168434",
            appId: "1:270636168434:web:046c7d9bc4d55aaececc6b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Si el mantenimiento se desactiva, volver al inicio
        db.ref('settings/maintenance').on('value', (snapshot) => {
            if (snapshot.val() === false) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
