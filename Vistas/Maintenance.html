<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mantenimiento | A⁺Pereira Company</title>
    <link rel="icon" type="image/x-icon" href="../img/ABP.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0c3363;
            --accent: #be945d;
            --text: #1a1a1a;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f4f7fa;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .container {
            padding: 2rem;
            max-width: 600px;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.2rem;
            color: #667;
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        /* --- ANIMACIÓN --- */
        .animation-box {
            position: relative;
            height: 150px;
            width: 100%;
            margin-bottom: 2rem;
        }

        /* Personaje (Muneco) */
        .worker {
            position: absolute;
            left: -50px;
            bottom: 0;
            font-size: 50px;
            animation: walk 8s linear infinite;
        }

        /* Caja de herramientas */
        .toolbox {
            position: absolute;
            right: 10%;
            bottom: 0;
            font-size: 40px;
        }

        /* Llave de herramientas */
        .wrench {
            display: inline-block;
            font-size: 24px;
            transform: rotate(-45deg);
            margin-left: -10px;
            animation: swing 0.5s ease-in-out infinite alternate;
        }

        @keyframes walk {
            0% { left: -10%; transform: scaleX(1); }
            45% { left: 80%; transform: scaleX(1); }
            50% { left: 80%; transform: scaleX(-1); }
            95% { left: -10%; transform: scaleX(-1); }
            100% { left: -10%; transform: scaleX(1); }
        }

        @keyframes swing {
            from { transform: rotate(-30deg); }
            to { transform: rotate(-60deg); }
        }

        /* --- LOADER --- */
        .loader {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 5px solid rgba(12, 51, 99, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
            margin-top: 2rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="animation-box">
            <div class="worker">
                👷<span class="wrench">🔧</span>
            </div>
            <div class="toolbox">🧰</div>
        </div>
        
        <h1>Estamos en mantenimiento</h1>
        <p>En unos momentos volveremos a estar activos.<br>Estamos trabajando para mejorar tu experiencia.</p>
        
        <div class="loader"></div>
    </div>

    <!-- Firebase para monitorear estado -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD6h6fErJd-nVhvxsTyBdJmkqLMzzR4rOk",
            authDomain: "abpereira-web.firebaseapp.com",
            databaseURL: "https://abpereira-web-default-rtdb.firebaseio.com",
            projectId: "abpereira-web",
            storageBucket: "abpereira-web.firebasestorage.app",
            messagingSenderId: "270636168434",
            appId: "1:270636168434:web:046c7d9bc4d55aaececc6b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Si el mantenimiento se desactiva, volver al inicio
        db.ref('settings/maintenance').on('value', (snapshot) => {
            if (snapshot.val() === false) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
