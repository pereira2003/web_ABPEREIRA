<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mantenimiento | A⁺Pereira Company</title>
    <link rel="icon" type="image/x-icon" href="../img/ABP.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0c3363;
            --accent: #be945d;
            --text: #1a1a1a;
            --bg: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            text-align: center;
            color: var(--text);
        }

        .container {
            padding: 2rem;
            max-width: 800px;
            width: 90%;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            color: var(--primary);
            margin: 0;
            letter-spacing: -1px;
        }

        p {
            font-size: 1.2rem;
            color: #555;
            margin: 1rem 0 4rem;
            font-weight: 300;
        }

        /* --- ESCENA CREATIVA --- */
        .scene {
            position: relative;
            height: 250px;
            width: 100%;
            background: #fdfdfd;
            border-bottom: 2px solid #eee;
            margin-bottom: 3rem;
            overflow: hidden;
        }

        /* Suelo con perspectiva */
        .floor {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40px;
            background: linear-gradient(to bottom, #f0f0f0, #ffffff);
        }

        /* Personaje Corriendo */
        .runner {
            position: absolute;
            bottom: 20px;
            left: -100px;
            width: 120px;
            height: 120px;
            animation: moveAcross 6s linear infinite;
        }

        .character-body {
            fill: #fff;
            stroke: #000;
            stroke-width: 1.5;
        }

        /* Animación de piernas corriendo */
        .leg {
            fill: none;
            stroke: #000;
            stroke-width: 2;
            transform-origin: 50% 50%;
        }

        .leg-left { animation: runLeg 0.4s infinite alternate; }
        .leg-right { animation: runLeg 0.4s infinite alternate-reverse; }

        @keyframes runLeg {
            from { transform: rotate(-30deg); }
            to { transform: rotate(30deg); }
        }

        /* Llave en la mano */
        .wrench-hand {
            transform-origin: 40% 60%;
            animation: armSwing 0.4s infinite alternate;
        }

        @keyframes armSwing {
            from { transform: rotate(-15deg); }
            to { transform: rotate(15deg); }
        }

        /* Caja de herramientas */
        .toolbox-target {
            position: absolute;
            right: 40px;
            bottom: 15px;
            width: 80px;
            height: 80px;
            animation: pulseToolbox 2s ease-in-out infinite;
        }

        @keyframes pulseToolbox {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Partículas de velocidad (humo/polvo) */
        .dust {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #eee;
            border-radius: 50%;
            bottom: 15px;
            opacity: 0;
            animation: dustCloud 0.6s infinite;
        }

        @keyframes dustCloud {
            0% { transform: translateX(0) scale(1); opacity: 0.8; }
            100% { transform: translateX(-40px) scale(2); opacity: 0; }
        }

        /* Animación principal del recorrido */
        @keyframes moveAcross {
            0% { left: -120px; transform: scaleX(1); }
            45% { left: calc(100% - 150px); transform: scaleX(1); }
            48% { left: calc(100% - 150px); transform: scaleX(-1); }
            95% { left: -120px; transform: scaleX(-1); }
            100% { left: -120px; transform: scaleX(1); }
        }

        /* --- LOADER MODERNO --- */
        .status-loader {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 2rem;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 50%;
            animation: dotWave 1.2s infinite ease-in-out;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotWave {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
            40% { transform: translateY(-15px); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="scene">
            <div class="floor"></div>
            
            <!-- Personaje Corriendo -->
            <div class="runner">
                <svg viewBox="0 0 100 100">
                    <!-- Piernas -->
                    <path class="leg leg-left" d="M45 75 L35 95" />
                    <path class="leg leg-right" d="M55 75 L65 95" />
                    
                    <!-- Cuerpo -->
                    <circle class="character-body" cx="50" cy="35" r="15" /> <!-- Cabeza -->
                    <path class="character-body" d="M35 50 Q50 45 65 50 L60 80 L40 80 Z" /> <!-- Tronco -->
                    
                    <!-- Brazo con llave -->
                    <g class="wrench-hand">
                        <path class="leg" d="M60 55 L80 45" /> <!-- Brazo -->
                        <path d="M78 40 L85 35 M82 45 L89 40 M85 35 A3 3 0 0 1 89 40" stroke="black" fill="none" /> <!-- Llave -->
                    </g>
                </svg>
                <!-- Partículas de polvo -->
                <div class="dust" style="left: 20px; animation-delay: 0s;"></div>
                <div class="dust" style="left: 10px; animation-delay: 0.2s;"></div>
            </div>

            <!-- Caja de herramientas -->
            <div class="toolbox-target">
                <svg viewBox="0 0 100 100">
                    <rect x="20" y="40" width="60" height="40" rx="5" fill="none" stroke="black" stroke-width="2" />
                    <path d="M40 40 V30 H60 V40" fill="none" stroke="black" stroke-width="2" />
                    <line x1="20" y1="55" x2="80" y2="55" stroke="black" stroke-width="2" />
                    <rect x="45" y="50" width="10" height="10" rx="2" fill="none" stroke="black" stroke-width="2" />
                </svg>
            </div>
        </div>
        
        <h1>Estamos en mantenimiento</h1>
        <p>En unos momentos volveremos a estar activos. Estamos trabajando para mejorar tu experiencia.</p>
        
        <div class="status-loader">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <!-- Firebase para monitorear estado -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD6h6fErJd-nVhvxsTyBdJmkqLMzzR4rOk",
            authDomain: "abpereira-web.firebaseapp.com",
            databaseURL: "https://abpereira-web-default-rtdb.firebaseio.com",
            projectId: "abpereira-web",
            storageBucket: "abpereira-web.firebasestorage.app",
            messagingSenderId: "270636168434",
            appId: "1:270636168434:web:046c7d9bc4d55aaececc6b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Si el mantenimiento se desactiva, volver al inicio
        db.ref('settings/maintenance').on('value', (snapshot) => {
            if (snapshot.val() === false) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
