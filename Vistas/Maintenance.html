<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mantenimiento | A⁺Pereira Company</title>
    <link rel="icon" type="image/x-icon" href="../img/ABP.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0c3363;
            --accent: #be945d;
            --text: #1a1a1a;
            --bg: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            text-align: center;
            color: var(--text);
        }

        .container {
            padding: 2rem;
            max-width: 800px;
            width: 90%;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            color: var(--primary);
            margin: 0;
            letter-spacing: -1px;
        }

        p {
            font-size: 1.2rem;
            color: #555;
            margin: 1rem 0 4rem;
            font-weight: 300;
        }

        /* --- ESCENA PROFESIONAL DE REPARACIÓN --- */
        .scene {
            position: relative;
            height: 300px;
            width: 100%;
            margin-bottom: 3rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .repair-animation {
            width: 200px;
            height: 200px;
            position: relative;
        }

        /* El Técnico (Estilo Profesional B&W) */
        .technician {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: var(--primary);
            stroke-width: 1;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Engranajes girando */
        .gear {
            transform-origin: center;
            animation: rotate 4s linear infinite;
        }
        .gear-slow { animation: rotate 8s linear infinite reverse; }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Brazo reparando */
        .repair-arm {
            transform-origin: 40px 60px;
            animation: repairWork 1.5s ease-in-out infinite alternate;
        }

        @keyframes repairWork {
            0% { transform: rotate(-5deg) translate(0, 0); }
            100% { transform: rotate(10deg) translate(5px, -5px); }
        }

        /* Chispas de trabajo */
        .spark {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0;
        }

        .spark-1 { top: 40%; left: 60%; animation: sparkAnim 0.8s infinite 0.2s; }
        .spark-2 { top: 45%; left: 65%; animation: sparkAnim 0.8s infinite 0.5s; }
        .spark-3 { top: 38%; left: 62%; animation: sparkAnim 0.8s infinite 0.7s; }

        @keyframes sparkAnim {
            0% { transform: scale(0) translate(0,0); opacity: 1; }
            100% { transform: scale(1.5) translate(20px, -20px); opacity: 0; }
        }

        /* --- LOADER MODERNO --- */
        .status-loader {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 2rem;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 50%;
            animation: dotWave 1.2s infinite ease-in-out;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotWave {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
            40% { transform: translateY(-15px); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="scene">
            <div class="repair-animation">
                <!-- Chispas -->
                <div class="spark spark-1"></div>
                <div class="spark spark-2"></div>
                <div class="spark spark-3"></div>
                
                <svg class="technician" viewBox="0 0 100 100">
                    <!-- Engranajes de fondo -->
                    <g class="gear-slow" style="opacity: 0.1;">
                        <path d="M50 20 L55 5 L65 10 L60 25 A30 30 0 0 1 75 40 L90 35 L95 45 L80 50 A30 30 0 0 1 75 60 L90 65 L85 75 L70 70 A30 30 0 0 1 60 80 L65 95 L55 100 L50 85 A30 30 0 0 1 40 85 L35 100 L25 95 L30 80 A30 30 0 0 1 20 70 L5 75 L0 65 L15 60 A30 30 0 0 1 15 40 L0 35 L5 25 L20 30 A30 30 0 0 1 30 20 L25 5 L35 0 L40 15 A30 30 0 0 1 50 20 Z" />
                    </g>
                    
                    <!-- Técnico reparando -->
                    <g class="repair-arm">
                        <!-- Brazo -->
                        <path d="M30 60 Q40 50 60 40" stroke-width="2" />
                        <!-- Llave Profesional -->
                        <g transform="translate(60, 40) rotate(-45)">
                            <path d="M-5 -2 L5 -2 L8 0 L5 2 L-5 2 Z" fill="var(--primary)" />
                            <circle cx="8" cy="0" r="3" fill="white" stroke="var(--primary)" />
                            <path d="M7 -1 L9 1 M7 1 L9 -1" stroke="var(--primary)" stroke-width="0.5" />
                        </g>
                    </g>
                    
                    <!-- Cabeza con casco profesional -->
                    <circle cx="40" cy="65" r="12" stroke-width="1.5" />
                    <path d="M28 60 A12 12 0 0 1 52 60" fill="var(--primary)" /> <!-- Casco -->
                    <rect x="35" y="55" width="10" height="3" fill="var(--accent)" /> <!-- Detalle casco -->
                </svg>
            </div>
        </div>
        
        <h1>Under Maintenance</h1>
        <p>We're currently fine-tuning our services to provide you with the best experience. We'll be back online shortly.</p>
        
        <div class="status-loader">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <!-- Firebase para monitorear estado -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD6h6fErJd-nVhvxsTyBdJmkqLMzzR4rOk",
            authDomain: "abpereira-web.firebaseapp.com",
            databaseURL: "https://abpereira-web-default-rtdb.firebaseio.com",
            projectId: "abpereira-web",
            storageBucket: "abpereira-web.firebasestorage.app",
            messagingSenderId: "270636168434",
            appId: "1:270636168434:web:046c7d9bc4d55aaececc6b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Si el mantenimiento se desactiva, volver al inicio
        db.ref('settings/maintenance').on('value', (snapshot) => {
            if (snapshot.val() === false) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
